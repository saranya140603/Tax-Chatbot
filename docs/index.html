<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TaxWise AI — Tax & Finance Assistant</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
  /* ── Reset & base ─────────────────────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 16px; -webkit-font-smoothing: antialiased; overflow-x: hidden; }

  :root {
    --bg:          #0b0f1a;
    --surface:     #131929;
    --surface-2:   #1a2236;
    --border:      #1f2e47;
    --border-2:    #263550;
    --accent:      #3b82f6;
    --accent-2:    #60a5fa;
    --accent-glow: rgba(59,130,246,0.18);
    --accent-soft: rgba(59,130,246,0.10);
    --green:       #10b981;
    --green-soft:  rgba(16,185,129,0.12);
    --text-1:      #f0f4ff;
    --text-2:      #94a3b8;
    --text-3:      #64748b;
    --user-bubble: #1e3a5f;
    --ai-bubble:   #131929;
    --radius-sm:   8px;
    --radius:      14px;
    --radius-lg:   20px;
    --shadow:      0 4px 24px rgba(0,0,0,0.4);
  }

body {
    background: var(--bg);
    color: var(--text-1);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    overflow-x: hidden;
    width: 100%;
  }

  /* ── Ambient background grid ──────────────────────────────────────────── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(59,130,246,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(59,130,246,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* ── Top navbar ───────────────────────────────────────────────────────── */
  header {
    position: relative; z-index: 10;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 24px;
    height: 62px;
    background: rgba(11,15,26,0.95);
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(12px);
    flex-shrink: 0;
  }

  .logo {
    display: flex; align-items: center; gap: 10px;
  }
  .logo-icon {
    width: 34px; height: 34px; border-radius: 9px;
    background: linear-gradient(135deg, #1d4ed8, #3b82f6);
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; box-shadow: 0 0 14px rgba(59,130,246,0.35);
  }
  .logo-text {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 17px; font-weight: 700; color: var(--text-1); letter-spacing: -0.3px;
  }
  .logo-text span { color: var(--accent-2); }

  .header-right {
    display: flex; align-items: center; gap: 12px;
  }
  .status-pill {
    display: flex; align-items: center; gap: 6px;
    padding: 5px 12px; border-radius: 20px;
    background: var(--green-soft);
    border: 1px solid rgba(16,185,129,0.2);
    font-size: 12px; color: var(--green); font-weight: 500;
  }
  .status-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 6px var(--green);
    animation: pulse-dot 2.4s ease-in-out infinite;
  }
  @keyframes pulse-dot {
    0%,100% { opacity:1; transform:scale(1); }
    50%      { opacity:0.6; transform:scale(0.8); }
  }

  .new-chat-btn {
    display: flex; align-items: center; gap: 6px;
    padding: 7px 14px; border-radius: var(--radius-sm);
    background: var(--accent-soft); border: 1px solid var(--border-2);
    color: var(--accent-2); font-size: 13px; font-weight: 500;
    cursor: pointer; transition: all 0.18s ease;
  }
  .new-chat-btn:hover { background: var(--accent-glow); border-color: var(--accent); }

  /* ── Main layout ──────────────────────────────────────────────────────── */
  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative; z-index: 1;
    max-width: 820px;
    width: 100%;
    min-width: 0;
    margin: 0 auto;
    padding: 0 16px;
  }

  /* ── Chat area ────────────────────────────────────────────────────────── */
  #chat-area {
    flex: 1;
    overflow-y: auto;
    min-height: 0;
    overflow-x: hidden;
    scrollbar-gutter: stable both-edges;
    padding: 28px 0 16px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    scroll-behavior: smooth;
  }
  #chat-area::-webkit-scrollbar { width: 4px; }
  #chat-area::-webkit-scrollbar-track { background: transparent; }
  #chat-area::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 2px; }

  /* ── Welcome screen ───────────────────────────────────────────────────── */
  .welcome {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; flex: 1; padding: 48px 16px 32px;
    text-align: center; gap: 0;
  }
  .welcome-orb {
    width: 72px; height: 72px; border-radius: 20px;
    background: linear-gradient(135deg, #1d4ed8 0%, #3b82f6 50%, #60a5fa 100%);
    display: flex; align-items: center; justify-content: center;
    font-size: 34px; margin-bottom: 22px;
    box-shadow: 0 0 40px rgba(59,130,246,0.3), 0 0 80px rgba(59,130,246,0.1);
    animation: float 4s ease-in-out infinite;
  }
  @keyframes float {
    0%,100% { transform: translateY(0); }
    50%      { transform: translateY(-6px); }
  }
  .welcome h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 28px; font-weight: 700; color: var(--text-1);
    letter-spacing: -0.5px; margin-bottom: 10px;
  }
  .welcome p {
    font-size: 15px; color: var(--text-2); line-height: 1.6;
    max-width: 480px; margin-bottom: 32px;
  }

  /* ── Suggestion chips ─────────────────────────────────────────────────── */
  .chips-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px; width: 100%; max-width: 560px;
  }
  .chip {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 13px 16px;
    cursor: pointer;
    transition: all 0.18s ease;
    text-align: left;
  }
  .chip:hover {
    background: var(--surface-2);
    border-color: var(--accent);
    transform: translateY(-1px);
    box-shadow: 0 4px 14px rgba(59,130,246,0.12);
  }
  .chip-icon { font-size: 18px; margin-bottom: 6px; }
  .chip-text { font-size: 13px; color: var(--text-2); line-height: 1.4; }

  /* ── Message bubbles ──────────────────────────────────────────────────── */
  .msg-row {
    display: flex; gap: 10px; align-items: flex-end;
    animation: fade-up 0.22s ease forwards;
  }
  @keyframes fade-up {
    from { opacity:0; transform:translateY(8px); }
    to   { opacity:1; transform:translateY(0); }
  }
  .msg-row.user { flex-direction: row-reverse; }

  .avatar {
    width: 32px; height: 32px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px; flex-shrink: 0;
  }
  .avatar.ai {
    background: linear-gradient(135deg, #1d4ed8, #3b82f6);
    box-shadow: 0 0 10px rgba(59,130,246,0.25);
  }
  .avatar.user { background: var(--surface-2); border: 1px solid var(--border-2); }

  .bubble {
    max-width: 72%; padding: 13px 16px;
    border-radius: var(--radius-lg);
    font-size: 14.5px; line-height: 1.7; position: relative;
  }
  .msg-row.ai .bubble {
    background: var(--ai-bubble);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
    color: var(--text-1);
  }
  .msg-row.user .bubble {
    background: var(--user-bubble);
    border: 1px solid rgba(59,130,246,0.3);
    border-bottom-right-radius: 4px;
    color: var(--text-1);
  }

  /* Markdown-like formatting in AI responses */
  .bubble strong { color: var(--text-1); font-weight: 600; }
  .bubble ul, .bubble ol { padding-left: 18px; margin: 6px 0; }
  .bubble li { margin: 3px 0; color: var(--text-2); }
  .bubble p { margin: 4px 0; }
  .bubble code {
    background: var(--surface-2); border: 1px solid var(--border);
    border-radius: 4px; padding: 1px 6px;
    font-family: 'Courier New', monospace; font-size: 13px;
    color: var(--accent-2);
  }

  .msg-time {
    font-size: 11px; color: var(--text-3); margin-top: 4px;
    padding: 0 4px;
  }
  .msg-row.user .msg-time { text-align: right; }

  /* ── Typing indicator ─────────────────────────────────────────────────── */
  .typing-indicator { display: flex; gap: 5px; align-items: center; padding: 4px 0; }
  .typing-indicator span {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--accent); display: block;
    animation: bounce 1.2s ease-in-out infinite;
  }
  .typing-indicator span:nth-child(2) { animation-delay: 0.18s; }
  .typing-indicator span:nth-child(3) { animation-delay: 0.36s; }
  @keyframes bounce {
    0%,80%,100% { transform:translateY(0); opacity:0.5; }
    40%          { transform:translateY(-6px); opacity:1; }
  }

  /* ── Disclaimer banner ────────────────────────────────────────────────── */
  .disclaimer {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 14px; margin: 8px 0;
    background: rgba(234,179,8,0.07);
    border: 1px solid rgba(234,179,8,0.15);
    border-radius: var(--radius-sm);
    font-size: 12px; color: #a89060;
  }
  .disclaimer span:first-child { font-size: 14px; flex-shrink: 0; }

  /* ── Input area ───────────────────────────────────────────────────────── */
  .input-wrapper {
    padding: 12px 0 20px;
    flex-shrink: 0;
  }
  .input-box {
    display: flex; align-items: flex-end; gap: 10px;
    background: var(--surface);
    border: 1px solid var(--border-2);
    border-radius: var(--radius-lg);
    padding: 12px 14px;
    transition: border-color 0.18s ease, box-shadow 0.18s ease;
  }
  .input-box:focus-within {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-soft);
  }

  #user-input {
    flex: 1; background: none; border: none; outline: none;
    font-family: 'Inter', sans-serif;
    font-size: 14.5px; color: var(--text-1);
    resize: none; max-height: 140px; min-height: 24px;
    line-height: 1.6;
  }
  #user-input::placeholder { color: var(--text-3); }

  #send-btn {
    width: 38px; height: 38px; border-radius: 10px; flex-shrink: 0;
    background: linear-gradient(135deg, #1d4ed8, #3b82f6);
    border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.18s ease; box-shadow: 0 2px 10px rgba(59,130,246,0.3);
  }
  #send-btn:hover:not(:disabled) { transform: scale(1.06); box-shadow: 0 4px 16px rgba(59,130,246,0.45); }
  #send-btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }
  #send-btn svg { width: 16px; height: 16px; fill: #fff; }

  .input-meta {
    display: flex; justify-content: space-between; align-items: center;
    padding: 6px 4px 0;
  }
  .input-hint { font-size: 12px; color: var(--text-3); }
  #char-count { font-size: 12px; color: var(--text-3); }

  /* ── Error toast ──────────────────────────────────────────────────────── */
  .toast {
    position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
    background: #7f1d1d; border: 1px solid #b91c1c;
    color: #fca5a5; font-size: 13px; padding: 10px 18px;
    border-radius: 30px; z-index: 999;
    animation: fade-up 0.2s ease;
    pointer-events: none;
  }

  /* ── Responsive ───────────────────────────────────────────────────────── */
  @media (max-width: 600px) {
    .chips-grid { grid-template-columns: 1fr; }
    .bubble { max-width: 88%; }
    header { padding: 0 14px; }
    .logo-text { font-size: 15px; }
    .status-pill { display: none; }
  }
</style>
</head>
<body>

<!-- ── HEADER ──────────────────────────────────────────────────────────────── -->
<header>
  <div class="logo">
    <div class="logo-icon">💼</div>
    <div class="logo-text">Tax<span>Wise</span> AI</div>
  </div>
  <div class="header-right">
    <div class="status-pill">
      <div class="status-dot"></div>
      Llama 3.3 · Online
    </div>
    <button class="new-chat-btn" onclick="newChat()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      New chat
    </button>
  </div>
</header>

<!-- ── MAIN ────────────────────────────────────────────────────────────────── -->
<main>
  <div id="chat-area">
    <!-- Welcome screen rendered by JS -->
  </div>

  <!-- ── INPUT ─────────────────────────────────────────────────────────────── -->
  <div class="input-wrapper">
    <div class="disclaimer">
      <span>⚠️</span>
      TaxWise AI provides general information only — not professional tax advice. Consult a qualified tax advisor for your specific situation.
    </div>
    <div class="input-box">
      <textarea id="user-input" rows="1" placeholder="Ask about taxes, GST, deductions, capital gains…" maxlength="1000"></textarea>
      <button id="send-btn" onclick="sendMessage()" title="Send">
        <svg viewBox="0 0 24 24"><path d="M22 2L11 13M22 2L15 22l-4-9-9-4 20-7z"/></svg>
      </button>
    </div>
    <div class="input-meta">
      <span class="input-hint">Press Enter to send · Shift+Enter for new line</span>
      <span id="char-count">0 / 1000</span>
    </div>
  </div>
</main>

<script>
  // ── CONFIG ─────────────────────────────────────────────────────────────────
  // Replace this with your Render backend URL after deployment
  const BACKEND_URL = "https://tax-chatbot-a46m.onrender.com";

  // ── State ──────────────────────────────────────────────────────────────────
  let messages = [];
  let isLoading = false;

  const chatArea   = document.getElementById("chat-area");
  const inputEl    = document.getElementById("user-input");
  const sendBtn    = document.getElementById("send-btn");
  const charCount  = document.getElementById("char-count");

  // ── Render welcome ─────────────────────────────────────────────────────────
  function showWelcome() {
    chatArea.innerHTML = `
      <div class="welcome" id="welcome-screen">
        <div class="welcome-orb">💼</div>
        <h1>Your Tax & Finance Assistant</h1>
        <p>Ask me anything about income tax, GST/VAT, deductions, capital gains, or general financial planning — I'll explain it clearly.</p>
        <div class="chips-grid">
          <div class="chip" onclick="chipClick(this)">
            <div class="chip-icon">📊</div>
            <div class="chip-text">What are the income tax slabs for salaried employees in India?</div>
          </div>
          <div class="chip" onclick="chipClick(this)">
            <div class="chip-icon">🧾</div>
            <div class="chip-text">How does GST work and what are the different GST rates?</div>
          </div>
          <div class="chip" onclick="chipClick(this)">
            <div class="chip-icon">💰</div>
            <div class="chip-text">What deductions can I claim under Section 80C?</div>
          </div>
          <div class="chip" onclick="chipClick(this)">
            <div class="chip-icon">📈</div>
            <div class="chip-text">How is capital gains tax calculated on stock market investments?</div>
          </div>
        </div>
      </div>`;
  }

  // ── Suggestion chip clicked ────────────────────────────────────────────────
  function chipClick(el) {
    inputEl.value = el.querySelector('.chip-text').textContent;
    charCount.textContent = `${inputEl.value.length} / 1000`;
    sendMessage();
  }

  // ── New chat ───────────────────────────────────────────────────────────────
  function newChat() {
    messages = [];
    showWelcome();
    inputEl.value = "";
    charCount.textContent = "0 / 1000";
  }

  // ── Auto-grow textarea ─────────────────────────────────────────────────────
  inputEl.addEventListener("input", () => {
    inputEl.style.height = "auto";
    inputEl.style.height = Math.min(inputEl.scrollHeight, 140) + "px";
    charCount.textContent = `${inputEl.value.length} / 1000`;
  });

  // ── Enter key handler ──────────────────────────────────────────────────────
  inputEl.addEventListener("keydown", e => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  // ── Format AI text (basic markdown) ───────────────────────────────────────
  function formatText(text) {
    return text
      .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
      .replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>")
      .replace(/`([^`]+)`/g, "<code>$1</code>")
      .replace(/^### (.+)$/gm, "<strong>$1</strong>")
      .replace(/^## (.+)$/gm,  "<strong>$1</strong>")
      .replace(/^# (.+)$/gm,   "<strong>$1</strong>")
      .replace(/^\* (.+)$/gm,  "<li>$1</li>")
      .replace(/^- (.+)$/gm,   "<li>$1</li>")
      .replace(/^(\d+)\. (.+)$/gm, "<li>$2</li>")
      .replace(/(<li>.*<\/li>(\n|$))+/g, m => `<ul>${m}</ul>`)
      .replace(/\n{2,}/g, "</p><p>")
      .replace(/\n/g, "<br/>")
      .replace(/^(.+)$/, "<p>$1</p>");
  }

  // ── Get time string ────────────────────────────────────────────────────────
  function timeNow() {
    return new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
  }

  // ── Append message bubble ──────────────────────────────────────────────────
  function appendMessage(role, content, isTyping = false) {
    const row = document.createElement("div");
    row.className = `msg-row ${role}`;
    if (isTyping) row.id = "typing-row";

    const avatarHTML = role === "ai"
      ? `<div class="avatar ai">🤖</div>`
      : `<div class="avatar user">👤</div>`;

    const bubbleContent = isTyping
      ? `<div class="typing-indicator"><span></span><span></span><span></span></div>`
      : formatText(content);

    row.innerHTML = `
      ${avatarHTML}
      <div>
        <div class="bubble">${bubbleContent}</div>
        ${!isTyping ? `<div class="msg-time">${timeNow()}</div>` : ""}
      </div>`;

    chatArea.appendChild(row);
    chatArea.scrollTop = chatArea.scrollHeight;
    return row;
  }

  // ── Remove typing indicator ────────────────────────────────────────────────
  function removeTyping() {
    const t = document.getElementById("typing-row");
    if (t) t.remove();
  }

  // ── Show error toast ───────────────────────────────────────────────────────
  function showToast(msg) {
    const t = document.createElement("div");
    t.className = "toast"; t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 3500);
  }

  // ── Main send ──────────────────────────────────────────────────────────────
  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text || isLoading) return;

    // Remove welcome screen on first message
    const welcome = document.getElementById("welcome-screen");
    if (welcome) welcome.remove();

    // Add to state
    messages.push({ role: "user", content: text });

    // Render user bubble
    appendMessage("user", text);

    // Clear input
    inputEl.value = "";
    inputEl.style.height = "auto";
    charCount.textContent = "0 / 1000";

    // Show typing
    isLoading = true;
    sendBtn.disabled = true;
    appendMessage("ai", "", true);

    try {
      const res = await fetch(`${BACKEND_URL}/chat`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ messages })
      });

      if (!res.ok) throw new Error(`Server error ${res.status}`);

      const data = await res.json();
      const reply = data.reply;

      // Update state
      messages.push({ role: "assistant", content: reply });

      // Replace typing with answer
      removeTyping();
      appendMessage("ai", reply);

    } catch (err) {
      removeTyping();
      showToast("⚠️ Could not reach TaxWise AI — check your connection.");
      messages.pop(); // remove failed user message from state
    } finally {
      isLoading = false;
      sendBtn.disabled = false;
      inputEl.focus();
    }
  }

  // ── Init ───────────────────────────────────────────────────────────────────
  showWelcome();
  inputEl.focus();
</script>
</body>
</html>
